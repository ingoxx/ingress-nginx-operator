name: CI - Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: arc-runner-set
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-manifest:
    needs: build-and-push
    runs-on: arc-runner-set
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Update image tag
        run: |
          NEW_TAG=${{ needs.build-and-push.outputs.image-tag }}

          FILE_PATH="config/manager/kustomization.yaml"

          if [ -f "$FILE_PATH" ]; then
            sed -i "s|newTag:.*|newTag: ${NEW_TAG}|g" $FILE_PATH
            echo "Successfully updated $FILE_PATH to ${NEW_TAG}"
            cat $FILE_PATH | grep "newTag"
          else
            echo "Error: $FILE_PATH not found"
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.email "ci-bot@github.com"
          git config user.name "CI Bot"
          git add config/manager/kustomization.yaml   # ← changed from manager.yaml
          if ! git diff --staged --quiet; then
            git commit -m "ci: update operator image to ${{ needs.build-and-push.outputs.image-tag }}"
            git push
          else
            echo "No changes detected, skipping commit."
          fi
