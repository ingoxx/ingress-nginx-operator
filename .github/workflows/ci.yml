name: CI - Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: arc-runner-set
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-manifest:
    needs: build-and-push
    runs-on: arc-runner-set
    # Only update manifest on push to main, not on PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write   # needed to push back to same repo

    steps:
      - name: Checkout same repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHCR_TOKEN }}
          # No 'repository' field needed — defaults to current repo

      - name: Update image tag in config/default
        run: |
          NEW_TAG=${{ needs.build-and-push.outputs.image-tag }}
          # Update the image tag in your manager deployment
          # Adjust the grep pattern to match your actual image name
          find config/default -name "*.yaml" | xargs sed -i \
            "s|image: ghcr.io/ingoxx/ingress-nginx-operator:.*|image: ghcr.io/ingoxx/ingress-nginx-operator:${NEW_TAG}|g"
          echo "Updated to image tag: ${NEW_TAG}"
          grep -r "image:" config/default/

      - name: Commit and push manifest update
        run: |
          git config user.email "ci-bot@github.com"
          git config user.name "CI Bot"
          git add config/default/
          git diff --staged --quiet || \
            git commit -m "ci: update operator image to ${{ needs.build-and-push.outputs.image-tag }}"
          git push
