name: CI - Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      # 忽略清单文件的自动提交，防止触发 CI 的无限循环
      - 'config/manager/kustomization.yaml'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: arc-runner-set
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 强制将 Repository 名称转为小写，防止 Docker 镜像名因大写字母不合法
      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-manifest:
    needs: build-and-push
    runs-on: arc-runner-set
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHCR_TOKEN }}
          ref: main
          fetch-depth: 0 # 获取完整历史记录，防止后续 rebase 合并冲突失败

      # 获取合法的小写镜像名
      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update image tag with Kustomize
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          FULL_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          
          cd config/manager
          # Kustomize 会自动生成或修改 kustomization.yaml，不会破坏 manager.yaml 原文件
          kustomize edit set image controller=${FULL_IMAGE}:${SHORT_SHA}
          
          echo "Successfully updated kustomization.yaml to ${FULL_IMAGE}:${SHORT_SHA}"

      - name: Commit and push
        run: |
          git config user.email "ci-bot@github.com"
          git config user.name "CI Bot"
          
          # 我们只提交 kustomization.yaml
          git add config/manager/kustomization.yaml
          
          if ! git diff --staged --quiet; then
            # 提交信息末尾加入 [skip ci] 魔法指令，双重防止触发无限循环
            git commit -m "ci: update operator image tag to $(echo ${{ github.sha }} | cut -c1-7) [skip ci]"
          
            # 在 Push 之前先 pull --rebase 拉取最新代码，防止推送报错
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes detected, skipping commit."
          fi